apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "csi-driver-hostpath-on-steriod.fullname" . }}
  labels:
    {{- include "csi-driver-hostpath-on-steriod.labels" . | nindent 4 }}
rules:

- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch", "update"]

- apiGroups: [""]
  resources: ["persistentvolumes"]
  verbs: ["watch", "list", "create", "delete", "update", "patch"]

- apiGroups: [""]
  resources: ["nodes", "persistentvolumeclaims"]
  verbs: ["watch", "list", "get"]

- apiGroups: ["storage.k8s.io"]
  resources: ["csinodes", "storageclasses"]
  verbs: ["watch", "list", "get"]

- apiGroups: ["storage.k8s.io"]
  resources: ["volumeattachments"]
  verbs: ["watch", "list", "get", "patch", "update"]

- apiGroups: ["storage.k8s.io"]
  resources: ["volumeattachments/status"]
  verbs: ["watch", "list", "get", "patch", "update"]

- apiGroups: ["{{ .Values.crd.group | default "shilu.cloud" }}"]
  resources: ["hposvolumes"]
  verbs: ["create", "delete", "get", "list", "watch", "update", "patch"]

- apiGroups: ["{{ .Values.crd.group | default "shilu.cloud" }}"]
  resources: ["hposvolumes/status"]
  verbs: ["get", "update", "patch"]

- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "delete", "get", "list", "watch"]