apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "csi-driver-hostpath-on-steriod.fullname" . }}
  labels:
    {{- include "csi-driver-hostpath-on-steriod.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "csi-driver-hostpath-on-steriod.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "csi-driver-hostpath-on-steriod.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}