apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "csi-driver-hostpath-on-steriod.fullname" . }}-controller
  labels:
    {{- include "csi-driver-hostpath-on-steriod.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "csi-driver-hostpath-on-steriod.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        {{- include "csi-driver-hostpath-on-steriod.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: {{ include "csi-driver-hostpath-on-steriod.serviceAccountName" . }}
      containers:
        - name: csi-driver
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          args:
            - --endpoint=unix:///var/run/csi.sock
            - --mode=controller
            - --name={{ include "csi-driver-hostpath-on-steriod.driverName" . }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: socket-dir
              mountPath: /var/run
          {{- with .Values.controller.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

        - name: external-provisioner
          image: "{{ .Values.sidecars.provisioner.image }}:{{ .Values.sidecars.provisioner.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          args:
            - --csi-address=unix:///var/run/csi.sock
            - --v=5
          volumeMounts:
            - name: socket-dir
              mountPath: /var/run
          {{- with .Values.sidecars.provisioner.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

        - name: external-attacher
          image: "{{ .Values.sidecars.attacher.image }}:{{ .Values.sidecars.attacher.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          args:
            - --csi-address=unix:///var/run/csi.sock
            - --v=5
          volumeMounts:
            - name: socket-dir
              mountPath: /var/run
          {{- with .Values.sidecars.attacher.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

      volumes:
        - name: socket-dir
          emptyDir: {}