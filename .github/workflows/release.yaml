# .github/workflows/release.yaml
name: Release

on:
    
  push:
    tags:
      - 'v*'

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/csi-driver-hostpath-on-steriod:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/csi-driver-hostpath-on-steriod:latest

  helm:
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email \
            "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Update image tag in values.yaml
        run: |
            VERSION=${{ needs.docker.outputs.version }}
            sed -i "s/tag: \"local\"/tag: \"$VERSION\"/" charts/values.yaml

      - name: Update Chart.yaml version
        run: |
          VERSION=${{ needs.docker.outputs.version }}
          sed -i "s/^version: .*/version: $VERSION/" charts/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"$VERSION\"/" charts/Chart.yaml

      - name: Package Helm chart
        run: |
          helm package charts/ --destination .cr-release-packages

      - name: Generate release notes
        run: |
          VERSION=${{ needs.docker.outputs.version }}
          cat <<EOF > release-notes.md
          ## csi-driver-hostpath-on-steriod v$VERSION

          A hostpath CSI driver with full CSI flow support attachRequired: true, loop device backed storage, VolumeAttachment lifecycle, topology support.

          ### Installation

          #### Using Helm
          \`\`\`bash
          helm install hpos-csi-driver \\
            https://github.com/${{ github.repository }}/releases/download/v$VERSION/csi-driver-hostpath-on-steriod-$VERSION.tgz \\
            --namespace testing \\
            --create-namespace
          \`\`\`

          #### Docker Image
          \`\`\`
          ${{ secrets.DOCKERHUB_USERNAME }}/csi-driver-hostpath-on-steriod:$VERSION
          \`\`\`

          ### Requirements
          - Kubernetes 1.20+
          - kind or minikube (single node)

          **Full Changelog**: https://github.com/${{ github.repository }}/commits/v$VERSION
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release-notes.md
          files: |
            .cr-release-packages/*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}