apiVersion: apps/v1
kind: Deployment
metadata:
  name: csi-driver-hostpath-on-steriods-deploy
  namespace: testing
spec:
  selector:
    matchLabels:
      app: csi-driver-hostpath-on-steriod
      csi-driver-component: controller
  replicas: 1
  template:
    metadata:
      labels:
        app: csi-driver-hostpath-on-steriod
        csi-driver-component: controller
      name: csi-driver
    spec:
      serviceAccountName: hpos-sa
      containers:
        - name: csi-driver
          image: shilucloud/csi-driver-hostpath-on-steriod:local
          args:
            - --endpoint=unix:///var/run/csi.sock
            - --name=csi.driver.hostpath.on.steriod
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE        
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: socket-dir
              mountPath: /var/run

        - name: external-provisioner
          image: registry.k8s.io/sig-storage/csi-provisioner:v6.2.0
          args:
            - "--csi-address=unix:///var/run/csi.sock"
            - "--v=5"
          volumeMounts:
            - name: socket-dir
              mountPath: /var/run
        
        - name: external-attacher 
          image: registry.k8s.io/sig-storage/csi-attacher:v4.11.0
          args:
            - --csi-address=unix:///var/run/csi.sock
            - --v=5
          volumeMounts:
            - name: socket-dir
              mountPath: /var/run
        
        - name: external-snapshotter
          image: registry.k8s.io/sig-storage/csi-snapshotter:v8.5.0
          args:
            - --csi-address=unix:///var/run/csi.sock
            - --v=5
          volumeMounts:
            - name: socket-dir
              mountPath: /var/run

      volumes:
        - name: socket-dir
          emptyDir: {}

